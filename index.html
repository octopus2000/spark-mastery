<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#252836;--surface3:#2e3245;
  --border:#333750;--border-light:#3d4260;
  --text:#e2e4eb;--text-muted:#8b8fa3;--text-dim:#5c6078;
  --amber:#f59e0b;--amber-dim:#b45309;--amber-glow:rgba(245,158,11,0.15);
  --teal:#06b6d4;--teal-dim:#0891b2;
  --red:#ef4444;--red-dim:#dc2626;
  --green:#22c55e;--green-dim:#16a34a;
  --purple:#8b5cf6;--purple-dim:#7c3aed;
  --pink:#ec4899;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --sidebar-w:280px;
  --header-h:56px;
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{
  font-family:var(--font-body);background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;line-height:1.6;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);
}
a{color:var(--teal);text-decoration:none}
a:hover{text-decoration:underline}
button{cursor:pointer;font-family:var(--font-body);border:none;background:none;color:var(--text)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.app{display:flex;min-height:100vh}
.sidebar{
  width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);
  position:fixed;top:0;left:0;height:100vh;z-index:100;
  display:flex;flex-direction:column;transition:transform .3s ease;
  overflow-y:auto;
}
.sidebar.closed{transform:translateX(-100%)}
.main{
  margin-left:var(--sidebar-w);flex:1;min-height:100vh;
  display:flex;flex-direction:column;
}
.header{
  height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:50;
  justify-content:space-between;
}
.content{flex:1;padding:32px;max-width:960px;margin:0 auto;width:100%}

.sidebar-header{
  padding:20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.logo-icon{
  width:36px;height:36px;background:linear-gradient(135deg,var(--amber),#f97316);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:var(--bg);font-family:var(--font-mono);
}
.logo-text{font-weight:700;font-size:15px;letter-spacing:-0.02em}
.logo-sub{font-size:11px;color:var(--text-muted);font-weight:400;display:block;margin-top:1px}
.sidebar nav{flex:1;padding:12px 0}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 20px;
  font-size:13.5px;font-weight:500;color:var(--text-muted);
  transition:all .15s;cursor:pointer;border-left:3px solid transparent;
}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--amber-glow);color:var(--amber);border-left-color:var(--amber)}
.nav-icon{width:20px;text-align:center;font-size:14px;flex-shrink:0}
.nav-label{flex:1}
.nav-progress{
  width:40px;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;flex-shrink:0;
}
.nav-progress-fill{height:100%;border-radius:2px;transition:width .3s}
.nav-section{
  padding:6px 20px;font-size:10px;font-weight:700;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:0.1em;margin-top:8px;
}
.sidebar-footer{
  padding:16px 20px;border-top:1px solid var(--border);
  font-size:11px;color:var(--text-dim);text-align:center;
}
.sidebar-footer a{color:var(--text-muted);font-size:11px}

.hamburger{
  display:none;width:36px;height:36px;align-items:center;justify-content:center;
  border-radius:8px;font-size:20px;
}
.hamburger:hover{background:var(--surface2)}
.overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);
  z-index:99;opacity:0;transition:opacity .3s;
}
.overlay.show{display:block;opacity:1}

.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:24px;transition:border-color .2s;
}
.card:hover{border-color:var(--border-light)}
.card-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px}
.xp-bar-wrap{margin:16px 0}
.xp-bar{height:10px;background:var(--surface3);border-radius:5px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--amber),#f97316);border-radius:5px;transition:width .6s ease}
.level-badge{
  display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;
  font-family:var(--font-mono);letter-spacing:0.05em;
}
.level-junior{background:rgba(107,114,128,0.2);color:#9ca3af}
.level-mid{background:rgba(59,130,246,0.2);color:#60a5fa}
.level-senior{background:rgba(139,92,246,0.2);color:#a78bfa}
.level-staff{background:rgba(245,158,11,0.2);color:var(--amber)}
.level-principal{background:rgba(236,72,153,0.2);color:var(--pink)}
.stat-row{display:flex;gap:16px;flex-wrap:wrap}
.stat-item{text-align:center;flex:1;min-width:80px}
.stat-val{font-size:28px;font-weight:800;font-family:var(--font-mono);color:var(--amber)}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:2px}
.daily-card{grid-column:1/-1}

.radar-wrap{display:flex;align-items:center;justify-content:center;padding:12px 0}

.tier-tabs{display:flex;gap:4px;margin-bottom:24px}
.tier-tab{
  padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;
  background:var(--surface);border:1px solid var(--border);color:var(--text-muted);
  transition:all .15s;
}
.tier-tab:hover{border-color:var(--border-light);color:var(--text)}
.tier-tab.active{background:var(--amber-glow);border-color:var(--amber);color:var(--amber)}
.tier-tab .tier-count{font-size:11px;opacity:0.7;margin-left:4px}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:12px}
.q-num{
  font-family:var(--font-mono);font-size:12px;color:var(--amber);font-weight:600;
  background:var(--amber-glow);padding:4px 10px;border-radius:6px;white-space:nowrap;
}
.q-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.q-bookmark{
  padding:6px 10px;border-radius:6px;font-size:16px;
  background:var(--surface2);border:1px solid var(--border);transition:all .15s;
}
.q-bookmark:hover,.q-bookmark.active{border-color:var(--amber);color:var(--amber)}
.q-timer{
  font-family:var(--font-mono);font-size:13px;padding:6px 12px;
  border-radius:6px;background:var(--surface2);border:1px solid var(--border);
  color:var(--text-muted);min-width:60px;text-align:center;
}
.q-timer.warning{color:var(--red);border-color:var(--red)}
.q-text{font-size:17px;font-weight:600;line-height:1.5;margin-bottom:24px}
.options{display:flex;flex-direction:column;gap:10px}
.option-btn{
  display:flex;align-items:flex-start;gap:14px;padding:16px;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  text-align:left;font-size:14.5px;line-height:1.5;transition:all .15s;
  width:100%;
}
.option-btn:hover:not(.answered){border-color:var(--amber);background:var(--surface2)}
.option-letter{
  width:28px;height:28px;border-radius:50%;background:var(--surface3);
  display:flex;align-items:center;justify-content:center;font-size:12px;
  font-weight:700;font-family:var(--font-mono);flex-shrink:0;margin-top:1px;
  transition:all .15s;
}
.option-btn:hover:not(.answered) .option-letter{background:var(--amber);color:var(--bg)}
.option-btn.correct{border-color:var(--green);background:rgba(34,197,94,0.08)}
.option-btn.correct .option-letter{background:var(--green);color:var(--bg)}
.option-btn.wrong{border-color:var(--red);background:rgba(239,68,68,0.08)}
.option-btn.wrong .option-letter{background:var(--red);color:var(--bg)}
.option-btn.answered{cursor:default}

.explanation{
  margin-top:24px;border-radius:12px;overflow:hidden;
  animation:slideIn .3s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.explanation-main{
  padding:20px;background:var(--surface);border:1px solid var(--border);
  border-radius:12px 12px 0 0;
}
.explanation-title{
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.explanation-title.correct{color:var(--green)}
.explanation-title.wrong{color:var(--red)}
.explanation-text{font-size:14px;line-height:1.7;color:var(--text-muted)}
.tip-box{
  padding:16px 20px;background:var(--surface2);border:1px solid var(--border);
  border-top:none;
}
.tip-label{
  font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;
  letter-spacing:0.05em;margin-bottom:6px;
}
.tip-text{font-size:13px;line-height:1.6;color:var(--text-muted)}
.staff-box{
  padding:16px 20px;background:rgba(245,158,11,0.06);
  border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;
}
.staff-label{
  font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;
  letter-spacing:0.05em;margin-bottom:6px;display:flex;align-items:center;gap:6px;
}
.staff-text{font-size:13px;line-height:1.6;color:var(--text-muted)}
.q-nav{display:flex;justify-content:space-between;margin-top:24px;gap:12px}
.btn{
  padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;
  transition:all .15s;display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{background:var(--amber);color:var(--bg)}
.btn-primary:hover{background:#d97706}
.btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted)}
.btn-ghost:hover{border-color:var(--border-light);color:var(--text)}

.progress-domain{margin-bottom:24px}
.progress-domain-header{
  display:flex;align-items:center;gap:12px;margin-bottom:12px;
}
.progress-domain-icon{
  width:36px;height:36px;border-radius:8px;display:flex;
  align-items:center;justify-content:center;font-size:18px;
}
.progress-domain-name{font-weight:600;font-size:15px}
.progress-domain-pct{font-family:var(--font-mono);font-size:13px;color:var(--text-muted);margin-left:auto}
.progress-bar{height:8px;background:var(--surface3);border-radius:4px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;border-radius:4px;transition:width .6s ease}
.progress-tiers{display:flex;gap:12px;flex-wrap:wrap}
.progress-tier{
  padding:8px 14px;background:var(--surface2);border-radius:8px;font-size:12px;
  border:1px solid var(--border);
}
.progress-tier span{font-weight:600;color:var(--amber);font-family:var(--font-mono)}

.bookmark-item{
  padding:16px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;margin-bottom:10px;cursor:pointer;transition:all .15s;
}
.bookmark-item:hover{border-color:var(--amber)}
.bookmark-domain{font-size:11px;font-weight:600;color:var(--teal);margin-bottom:4px}
.bookmark-q{font-size:14px;font-weight:500;line-height:1.5}

.xp-float{
  position:fixed;font-family:var(--font-mono);font-weight:700;font-size:18px;
  color:var(--amber);pointer-events:none;z-index:200;
  animation:floatUp 1.2s ease forwards;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(1.2)}
}

.confetti-piece{
  position:fixed;width:8px;height:8px;z-index:300;pointer-events:none;
  animation:confettiFall 2s ease-out forwards;
}
@keyframes confettiFall{
  0%{opacity:1;transform:translateY(0) rotate(0deg)}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg)}
}

.review-item{
  padding:16px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;margin-bottom:10px;
}
.review-q{font-size:14px;font-weight:600;margin-bottom:8px;line-height:1.5}
.review-answer{font-size:13px;padding:8px 12px;border-radius:6px;line-height:1.5}
.review-answer.correct{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2)}
.review-answer.wrong{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2)}
.review-meta{display:flex;gap:12px;font-size:11px;color:var(--text-dim);margin-top:8px}

.timer-toggle{
  display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);
}
.toggle-switch{
  width:36px;height:20px;background:var(--surface3);border-radius:10px;
  position:relative;cursor:pointer;transition:background .2s;
}
.toggle-switch.on{background:var(--amber)}
.toggle-switch::after{
  content:'';position:absolute;width:16px;height:16px;background:#fff;
  border-radius:50%;top:2px;left:2px;transition:transform .2s;
}
.toggle-switch.on::after{transform:translateX(16px)}

.empty-state{
  text-align:center;padding:60px 20px;color:var(--text-dim);
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.5}
.empty-title{font-size:16px;font-weight:600;color:var(--text-muted);margin-bottom:8px}
.empty-desc{font-size:13px;max-width:300px;margin:0 auto}

.mastery-badge{
  display:inline-flex;align-items:center;gap:6px;padding:4px 10px;
  border-radius:6px;font-size:11px;font-weight:700;
  background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(249,115,22,0.2));
  color:var(--amber);border:1px solid rgba(245,158,11,0.3);
  font-family:var(--font-mono);
}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .hamburger{display:flex}
  .content{padding:20px 16px}
  .dash-grid{grid-template-columns:1fr}
  .q-text{font-size:15px}
  .stat-val{font-size:22px}
  .tier-tabs{flex-wrap:wrap}
  .header{padding:0 16px}
}
@media(max-width:480px){
  .option-btn{padding:12px;font-size:13px}
  .option-letter{width:24px;height:24px;font-size:11px}
}
</style>
</head>

<div class="app" id="app">
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">S</div>
      <div>
        <div class="logo-text">Spark Mastery Arena</div>
        <span class="logo-sub">Staff DE Interview Prep</span>
      </div>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">

      </a>
    </div>
  </aside>
  <div class="main">
    <header class="header">
      <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
      <div style="display:flex;align-items:center;gap:12px">
        <span id="header-level" class="level-badge level-junior">JUNIOR</span>
        <span style="font-family:var(--font-mono);font-size:13px;color:var(--amber)" id="header-xp">0 XP</span>
      </div>

        <span>Timer</span>
        <div class="toggle-switch" id="timer-toggle" onclick="toggleTimer()"></div>
      </div>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>
<script>
const DOMAINS = [
  {
    "id": "spark-architecture",
    "name": "Spark Architecture & Internals",
    "icon": "\u26a1",
    "color": "#f59e0b",
    "tiers": {
      "foundation": [
        {
          "q": "What is the role of the Driver in a Spark application?",
          "options": [
            "Orchestrates the execution plan, negotiates resources with the cluster manager, and distributes tasks to executors",
            "Stores all the data for the application in local memory",
            "Executes transformations directly on the data partitions",
            "Manages HDFS block replication and data locality"
          ],
          "correct": 0,
          "explanation": "The Driver is the brain of a Spark application. It runs the main() function, creates the SparkContext, builds the DAG of transformations, negotiates with the cluster manager for executor resources, and schedules tasks across the cluster. It does not store data or execute transformations itself.",
          "interviewTip": "When discussing the Driver, emphasize its orchestration role and mention that it maintains the DAG scheduler and task scheduler. This shows you understand the internal architecture beyond surface-level descriptions."
        },
        {
          "q": "What is lazy evaluation in Spark and why does it matter?",
          "options": [
            "Transformations are not executed until an action is called, allowing Catalyst to optimize the entire DAG",
            "It means Spark processes data slowly to conserve resources",
            "Data is loaded into memory immediately but transformations are deferred",
            "It prevents caching from working effectively"
          ],
          "correct": 0,
          "explanation": "Lazy evaluation means Spark records transformations as a lineage graph without executing them. Only when an action (collect, count, write) is triggered does Spark compile the plan. This allows the Catalyst optimizer to analyze the entire chain and apply optimizations like predicate pushdown, column pruning, and join reordering before any data moves.",
          "interviewTip": "Connect lazy evaluation to the Catalyst optimizer \u2014 explain that deferring execution lets Spark see the 'big picture' and optimize globally rather than greedily optimizing each step. Mention a concrete example like filter pushdown past a join."
        },
        {
          "q": "What happens during a Spark shuffle?",
          "options": [
            "Data is redistributed across partitions based on a key, involving disk I/O, network transfer, and serialization \u2014 the most expensive operation in Spark",
            "Data is sorted in memory only without any disk involvement",
            "Partitions are simply renamed without moving data",
            "The driver collects all data and redistributes it to executors"
          ],
          "correct": 0,
          "explanation": "A shuffle involves writing intermediate data to local disk on each executor, then transferring it across the network to the appropriate target partitions. This involves serialization, disk I/O, network I/O, and deserialization \u2014 making it the most expensive operation in Spark. Minimizing shuffles is key to Spark performance tuning.",
          "interviewTip": "Always mention the three costs of shuffle: disk I/O (writing shuffle files), network I/O (transferring data between nodes), and serialization/deserialization overhead. This shows depth of understanding."
        },
        {
          "q": "What is the difference between narrow and wide transformations?",
          "options": [
            "Narrow transformations (map, filter) don't require data movement between partitions; wide transformations (groupBy, join) trigger a shuffle",
            "Narrow transformations process fewer rows; wide transformations process more rows",
            "Narrow transformations use less memory; wide transformations use more memory but are faster",
            "There is no meaningful difference \u2014 both are processed the same way internally"
          ],
          "correct": 0,
          "explanation": "Narrow transformations operate on data within a single partition \u2014 each output partition depends on at most one input partition. Wide transformations require data from multiple input partitions to produce output, triggering a shuffle. This distinction determines stage boundaries in the execution plan.",
          "interviewTip": "Give examples: map, filter, flatMap are narrow; groupByKey, reduceByKey, join (on non-partitioned data), and distinct are wide. Mention that Spark pipelines narrow transformations together within a single stage for efficiency."
        },
        {
          "q": "How does Spark determine the number of partitions for a shuffle operation?",
          "options": [
            "By default, spark.sql.shuffle.partitions (200), but AQE can dynamically coalesce small partitions at runtime",
            "It always uses the number of executor cores",
            "It calculates partitions based solely on input data size",
            "It always creates exactly 1 partition per core"
          ],
          "correct": 0,
          "explanation": "The default spark.sql.shuffle.partitions is 200, which is often suboptimal. For small data it creates too many tiny partitions; for large data, too few large ones. Adaptive Query Execution (AQE) in Spark 3.x can dynamically coalesce small post-shuffle partitions, reducing overhead without manual tuning.",
          "interviewTip": "Mention that the default 200 is a common performance pitfall. In interviews, say you'd tune this based on data size and cluster resources, or rely on AQE. A good rule of thumb is targeting 128MB-200MB per partition."
        },
        {

const TIER_NAMES = ["foundation","advanced","staff"];
const TIER_LABELS = {foundation:"Foundation",advanced:"Advanced",staff:"Staff-Level"};
const TIER_TIMES = {foundation:90,advanced:120,staff:180};
const LEVEL_THRESHOLDS = [
  {name:"Junior",min:0,cls:"level-junior"},
  {name:"Mid",min:100,cls:"level-mid"},
  {name:"Senior",min:300,cls:"level-senior"},
  {name:"Staff",min:600,cls:"level-staff"},
  {name:"Principal",min:900,cls:"level-principal"}
];
const LETTERS = ["A","B","C","D"];

const DEFAULT_STATE = {
  view: "dashboard",
  activeDomain: null,
  activeTier: "foundation",
  activeQuestion: 0,
  xp: 0,
  streak: 0,
  dailyStreak: 0,
  lastDay: null,
  questionsAnswered: 0,
  correctAnswers: 0,
  timerEnabled: false,
  timerValue: 0,
  timerInterval: null,
  bookmarks: [],
  answers: {},
  tierCompleted: {},
  tierXP: {},
  domainXP: {},
  shuffledOrders: {},
};

function saveState() {
  try {
    const toSave = {};
    const persistKeys = ["xp","streak","dailyStreak","lastDay","questionsAnswered","correctAnswers","bookmarks","answers","tierCompleted","tierXP","domainXP","shuffledOrders","timerEnabled"];
    for (const k of persistKeys) toSave[k] = state[k];
    localStorage.setItem("spark-mastery-state", JSON.stringify(toSave));
  } catch(e) { /* localStorage unavailable */ }
}

function loadState() {
  try {
    const raw = localStorage.getItem("spark-mastery-state");
    if (raw) {
      const saved = JSON.parse(raw);
      for (const k of Object.keys(saved)) {
        if (saved[k] !== undefined && saved[k] !== null) state[k] = saved[k];
      }
    }
  } catch(e) { /* localStorage unavailable or corrupted */ }
}

function exportProgress() {
  const toExport = {};
  const keys = ["xp","streak","dailyStreak","lastDay","questionsAnswered","correctAnswers","bookmarks","answers","tierCompleted","tierXP","domainXP","shuffledOrders"];
  for (const k of keys) toExport[k] = state[k];
  const blob = new Blob([JSON.stringify(toExport, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "spark-mastery-progress.json"; a.click();
  URL.revokeObjectURL(url);
}

function importProgress() {
  const input = document.createElement("input");
  input.type = "file"; input.accept = ".json";
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        for (const k of Object.keys(imported)) {
          if (imported[k] !== undefined) state[k] = imported[k];
        }
        saveState();
        render();
      } catch(err) { alert("Invalid progress file."); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetProgress() {
  if (!confirm("Reset all progress? This cannot be undone.")) return;
  const keys = ["xp","streak","dailyStreak","lastDay","questionsAnswered","correctAnswers","bookmarks","answers","tierCompleted","tierXP","domainXP","shuffledOrders"];
  for (const k of keys) state[k] = DEFAULT_STATE[k] instanceof Array ? [] : (typeof DEFAULT_STATE[k] === "object" && DEFAULT_STATE[k] !== null ? {} : DEFAULT_STATE[k]);
  saveState();
  render();
}

let state = JSON.parse(JSON.stringify(DEFAULT_STATE));
loadState();

function getLevel(xp) {
  let lvl = LEVEL_THRESHOLDS[0];
  for (const l of LEVEL_THRESHOLDS) if (xp >= l.min) lvl = l;
  return lvl;
}

function getNextLevel(xp) {
  for (let i = 0; i < LEVEL_THRESHOLDS.length; i++) {
    if (xp < LEVEL_THRESHOLDS[i].min) return LEVEL_THRESHOLDS[i];
  }
  return null;
}

function getDomainXP(domainId) {
  return state.domainXP[domainId] || 0;
}

function getTierKey(domainId, tier) {
  return domainId + "-" + tier;
}

function getAnswerKey(domainId, tier, qIndex) {
  return domainId + "-" + tier + "-" + qIndex;
}

function getShuffledOrder(domainId, tier) {
  const key = getTierKey(domainId, tier);
  if (!state.shuffledOrders[key]) {
    const domain = DOMAINS.find(d => d.id === domainId);
    const questions = domain.tiers[tier];
    const indices = Array.from({length: questions.length}, (_, i) => i);
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    state.shuffledOrders[key] = indices;
  }
  return state.shuffledOrders[key];
}

function getTierProgress(domainId, tier) {
  const domain = DOMAINS.find(d => d.id === domainId);
  const questions = domain.tiers[tier];
  let answered = 0, correct = 0;
  for (let i = 0; i < questions.length; i++) {
    const k = getAnswerKey(domainId, tier, i);
    if (state.answers[k]) {
      answered++;
      if (state.answers[k].correct) correct++;
    }
  }
  return { answered, correct, total: questions.length };
}

function getDomainProgress(domainId) {
  let answered = 0, correct = 0, total = 0;
  for (const tier of TIER_NAMES) {
    const p = getTierProgress(domainId, tier);
    answered += p.answered; correct += p.correct; total += p.total;
  }
  return { answered, correct, total };
}

function hasMastery(domainId) {
  for (const tier of TIER_NAMES) {
    const p = getTierProgress(domainId, tier);
    if (p.answered < p.total) return false;
    if (p.correct / p.total < 0.8) return false;
  }
  return true;
}

function isBookmarked(domainId, tier, qIndex) {
  return state.bookmarks.some(b => b.domainId === domainId && b.tier === tier && b.qIndex === qIndex);
}

function toggleBookmark(domainId, tier, qIndex) {
  const idx = state.bookmarks.findIndex(b => b.domainId === domainId && b.tier === tier && b.qIndex === qIndex);
  if (idx >= 0) state.bookmarks.splice(idx, 1);
  else state.bookmarks.push({ domainId, tier, qIndex });
  saveState();
  render();
}

function showXPAnimation(amount, x, y) {
  const el = document.createElement("div");
  el.className = "xp-float";
  el.textContent = "+" + amount + " XP";
  el.style.left = x + "px";
  el.style.top = y + "px";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function showConfetti() {
  const colors = ["#f59e0b","#06b6d4","#8b5cf6","#ef4444","#22c55e","#ec4899"];
  for (let i = 0; i < 50; i++) {
    const el = document.createElement("div");
    el.className = "confetti-piece";
    el.style.left = Math.random() * 100 + "vw";
    el.style.top = "-10px";
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.borderRadius = Math.random() > 0.5 ? "50%" : "0";
    el.style.animationDuration = (1.5 + Math.random()) + "s";
    el.style.animationDelay = Math.random() * 0.5 + "s";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}

function toggleTimer() {
  state.timerEnabled = !state.timerEnabled;
  document.getElementById("timer-toggle").classList.toggle("on", state.timerEnabled);
  render();
}

function startTimer(seconds) {
  clearInterval(state.timerInterval);
  state.timerValue = seconds;
  state.timerInterval = setInterval(() => {
    state.timerValue--;
    const el = document.getElementById("q-timer");
    if (el) {
      const m = Math.floor(state.timerValue / 60);
      const s = state.timerValue % 60;
      el.textContent = m + ":" + String(s).padStart(2, "0");
      el.classList.toggle("warning", state.timerValue <= 15);
    }
    if (state.timerValue <= 0) clearInterval(state.timerInterval);
  }, 1000);
}

function stopTimer() {
  clearInterval(state.timerInterval);
}

function trackDaily() {
  const today = new Date().toDateString();
  if (state.lastDay !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (state.lastDay === yesterday) state.dailyStreak++;
    else state.dailyStreak = 1;
    state.lastDay = today;
    saveState();
  }
}

function navigate(view, domainId, tier) {
  state.view = view;
  if (domainId !== undefined) state.activeDomain = domainId;
  if (tier !== undefined) state.activeTier = tier;
  state.activeQuestion = 0;
  stopTimer();
  render();
  window.scrollTo(0, 0);
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}

function answerQuestion(domainId, tier, qIndex, selected) {
  const key = getAnswerKey(domainId, tier, qIndex);
  if (state.answers[key]) return;

  const domain = DOMAINS.find(d => d.id === domainId);
  const question = domain.tiers[tier][qIndex];
  const correct = selected === question.correct;

  state.answers[key] = { selected, correct };
  state.questionsAnswered++;
  if (correct) state.correctAnswers++;
  saveState();

  let xpGained = 0;
  if (correct) {
    xpGained = 10;
    state.streak++;
    if (state.streak >= 3) xpGained += 5;
  } else {
    state.streak = 0;
  }

  const progress = getTierProgress(domainId, tier);
  if (progress.answered === progress.total && !state.tierCompleted[getTierKey(domainId, tier)]) {
    state.tierCompleted[getTierKey(domainId, tier)] = true;
    xpGained += 20;
  }

  const oldLevel = getLevel(state.xp).name;
  state.xp += xpGained;
  state.domainXP[domainId] = (state.domainXP[domainId] || 0) + xpGained;
  state.tierXP[getTierKey(domainId, tier)] = (state.tierXP[getTierKey(domainId, tier)] || 0) + xpGained;
  saveState();

  const newLevel = getLevel(state.xp).name;
  if (newLevel !== oldLevel) showConfetti();

  trackDaily();
  stopTimer();

  if (xpGained > 0) {
    const btn = document.querySelector(`.option-btn[data-idx="${selected}"]`);
    if (btn) {
      const rect = btn.getBoundingClientRect();
      showXPAnimation(xpGained, rect.right - 60, rect.top);
    }
  }

  render();
}

function renderHeader() {
  const level = getLevel(state.xp);
  document.getElementById("header-level").className = "level-badge " + level.cls;
  document.getElementById("header-level").textContent = level.name.toUpperCase();
  document.getElementById("header-xp").textContent = state.xp + " XP";
}

function renderRadar() {
  const cx = 165, cy = 135, r = 72, n = DOMAINS.length;
  const maxXP = 240;
  let svg = `<svg width="330" height="280" viewBox="0 0 330 280">`;
  for (let ring = 1; ring <= 4; ring++) {
    const rr = r * ring / 4;
    let points = [];
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      points.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
    }
    svg += `<polygon points="${points.join(" ")}" fill="none" stroke="var(--border)" stroke-width="0.5"/>`;
  }
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    svg += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(angle)}" y2="${cy + r * Math.sin(angle)}" stroke="var(--border)" stroke-width="0.5"/>`;
  }
  let dataPoints = [];
  for (let i = 0; i < n; i++) {
    const xp = getDomainXP(DOMAINS[i].id);
    const ratio = Math.min(xp / maxXP, 1);
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    dataPoints.push(`${cx + r * ratio * Math.cos(angle)},${cy + r * ratio * Math.sin(angle)}`);
  }
  svg += `<polygon points="${dataPoints.join(" ")}" fill="rgba(245,158,11,0.15)" stroke="var(--amber)" stroke-width="2"/>`;
  for (let i = 0; i < n; i++) {
    const xp = getDomainXP(DOMAINS[i].id);
    const ratio = Math.min(xp / maxXP, 1);
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const dx = cx + r * ratio * Math.cos(angle);
    const dy = cy + r * ratio * Math.sin(angle);
    svg += `<circle cx="${dx}" cy="${dy}" r="4" fill="var(--amber)"/>`;
    const lx = cx + (r + 30) * Math.cos(angle);
    const ly = cy + (r + 30) * Math.sin(angle);
    const anchor = Math.abs(Math.cos(angle)) < 0.1 ? "middle" : Math.cos(angle) > 0 ? "start" : "end";
    const labelNames = ["Spark","Modeling","Pipeline","Perf.","Design"];
    svg += `<text x="${lx}" y="${ly+4}" fill="var(--text-muted)" font-size="11" font-weight="500" font-family="var(--font-body)" text-anchor="${anchor}">${labelNames[i]}</text>`;
  }
  svg += `</svg>`;
  return svg;
}

function renderDashboard() {
  const level = getLevel(state.xp);
  const next = getNextLevel(state.xp);
  const xpInLevel = next ? state.xp - level.min : state.xp;
  const xpForNext = next ? next.min - level.min : 1;
  const pct = next ? Math.min(xpInLevel / xpForNext * 100, 100) : 100;
  const accuracy = state.questionsAnswered > 0 ? Math.round(state.correctAnswers / state.questionsAnswered * 100) : 0;

  let html = `<h2 style="font-size:22px;font-weight:700;margin-bottom:24px">Dashboard</h2>`;
  html += `<div class="dash-grid">`;

  html += `<div class="card">
    <div class="card-title">Experience & Level</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <span class="level-badge ${level.cls}">${level.name.toUpperCase()}</span>
      ${next ? `<span style="font-size:12px;color:var(--text-dim)">→ ${next.name} at ${next.min} XP</span>` : `<span style="font-size:12px;color:var(--amber)">MAX LEVEL</span>`}
    </div>
    <div class="xp-bar-wrap">
      <div class="xp-bar"><div class="xp-fill" style="width:${pct}%"></div></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted)">
      <span>${state.xp} XP total</span>
      ${next ? `<span>${next.min - state.xp} XP to ${next.name}</span>` : ""}
    </div>
  </div>`;

  html += `<div class="card">
    <div class="card-title">Domain Proficiency</div>
    <div class="radar-wrap">${renderRadar()}</div>
  </div>`;

  html += `<div class="card">
    <div class="card-title">Your Stats</div>
    <div class="stat-row">
      <div class="stat-item"><div class="stat-val">${state.questionsAnswered}</div><div class="stat-label">Answered</div></div>
      <div class="stat-item"><div class="stat-val">${accuracy}%</div><div class="stat-label">Accuracy</div></div>
      <div class="stat-item"><div class="stat-val">${state.streak}</div><div class="stat-label">Streak</div></div>
      <div class="stat-item"><div class="stat-val">${state.dailyStreak}</div><div class="stat-label">Daily Streak</div></div>
    </div>
  </div>`;

  // Daily Challenge
  const allQs = [];
  for (const d of DOMAINS) for (const t of TIER_NAMES) {
    d.tiers[t].forEach((q, i) => {
      if (!state.answers[getAnswerKey(d.id, t, i)]) allQs.push({d: d.id, t, i, q});
    });
  }
  html += `<div class="card daily-card"><div class="card-title">🎯 Daily Challenge</div>`;
  if (allQs.length > 0) {
    const rand = allQs[Math.floor(Math.random() * allQs.length)];
    const domain = DOMAINS.find(d => d.id === rand.d);
    html += `<div style="margin-bottom:12px">
      <span style="font-size:11px;padding:3px 8px;border-radius:4px;background:${domain.color}22;color:${domain.color};font-weight:600">${domain.name} · ${TIER_LABELS[rand.t]}</span>
    </div>
    <div style="font-size:15px;font-weight:500;line-height:1.5;margin-bottom:16px">${rand.q.q}</div>
    <button class="btn btn-primary" onclick="navigate('domain','${rand.d}','${rand.t}')">Start Challenge →</button>`;
  } else {
    html += `<div style="color:var(--text-muted);font-size:14px">All questions answered! Great job! 🎉</div>`;
  }
  html += `</div></div>`;

  html += `<h3 style="font-size:16px;font-weight:600;margin:24px 0 16px">Domains Overview</h3>`;
  for (const domain of DOMAINS) {
    const p = getDomainProgress(domain.id);
    const pct2 = p.total > 0 ? Math.round(p.answered / p.total * 100) : 0;
    const mastery = hasMastery(domain.id);
    html += `<div class="card" style="margin-bottom:12px;cursor:pointer" onclick="navigate('domain','${domain.id}')">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <span style="font-size:20px">${domain.icon}</span>
        <span style="font-weight:600;font-size:14px">${domain.name}</span>
        ${mastery ? '<span class="mastery-badge">★ MASTERY</span>' : ''}
        <span style="margin-left:auto;font-family:var(--font-mono);font-size:13px;color:var(--text-muted)">${p.answered}/${p.total}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct2}%;background:${domain.color}"></div></div>
    </div>`;
  }
  return html;
}

function renderDomain() {
  const domain = DOMAINS.find(d => d.id === state.activeDomain);
  if (!domain) return renderDashboard();

  const tier = state.activeTier;
  const questions = domain.tiers[tier];
  const order = getShuffledOrder(domain.id, tier);
  const qIdx = state.activeQuestion;

  let html = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
    <span style="font-size:24px">${domain.icon}</span>
    <div>
      <h2 style="font-size:20px;font-weight:700">${domain.name}</h2>
      <div style="font-size:12px;color:var(--text-muted)">${getDomainProgress(domain.id).answered} of ${getDomainProgress(domain.id).total} questions answered</div>
    </div>
    ${hasMastery(domain.id) ? '<span class="mastery-badge" style="margin-left:auto">★ MASTERY ACHIEVED</span>' : ''}
  </div>`;

  html += `<div class="tier-tabs">`;
  for (const t of TIER_NAMES) {
    const p = getTierProgress(domain.id, t);
    html += `<button class="tier-tab ${t === tier ? "active" : ""}" onclick="navigate('domain','${domain.id}','${t}')">
      ${TIER_LABELS[t]}<span class="tier-count">(${p.answered}/${p.total})</span>
    </button>`;
  }
  html += `</div>`;

  if (qIdx < order.length) {
    const realIdx = order[qIdx];
    const q = questions[realIdx];
    const ansKey = getAnswerKey(domain.id, tier, realIdx);
    const answer = state.answers[ansKey];
    const bm = isBookmarked(domain.id, tier, realIdx);

    html += `<div class="card" style="margin-bottom:0">`;
    html += `<div class="q-header">
      <span class="q-num">Q${qIdx+1} / ${order.length}${tier === "staff" ? " · Staff-Level" : ""}</span>
      <div class="q-actions">`;
    if (state.timerEnabled && !answer) {
      const m = Math.floor(state.timerValue / 60);
      const s = state.timerValue % 60;
      html += `<span class="q-timer${state.timerValue <= 15 ? " warning" : ""}" id="q-timer">${m}:${String(s).padStart(2, "0")}</span>`;
    }
    html += `<button class="q-bookmark ${bm?"active":""}" onclick="toggleBookmark('${domain.id}','${tier}',${realIdx})" title="Bookmark">${bm?"★":"☆"}</button>
      </div></div>`;

    html += `<div class="q-text">${q.q}</div>`;
    html += `<div class="options">`;
    for (let i = 0; i < q.options.length; i++) {
      let cls = "option-btn";
      if (answer) {
        cls += " answered";
        if (i === q.correct) cls += " correct";
        else if (i === answer.selected && !answer.correct) cls += " wrong";
      }
      const onclick = answer ? "" : `onclick="answerQuestion('${domain.id}','${tier}',${realIdx},${i})"`;
      html += `<button class="${cls}" data-idx="${i}" ${onclick}>
        <span class="option-letter">${LETTERS[i]}</span>
        <span>${q.options[i]}</span>
      </button>`;
    }
    html += `</div>`;

    if (answer) {
      html += `<div class="explanation">
        <div class="explanation-main">
          <div class="explanation-title ${answer.correct?"correct":"wrong"}">
            ${answer.correct ? "✓ Correct!" : "✗ Incorrect"} ${!answer.correct ? "— The correct answer is " + LETTERS[q.correct] : ""}
          </div>
          <div class="explanation-text">${q.explanation}</div>
        </div>
        <div class="tip-box">
          <div class="tip-label">💡 Interview Tip</div>
          <div class="tip-text">${q.interviewTip}</div>
        </div>`;
      if (q.staffMindset) {
        html += `<div class="staff-box">
          <div class="staff-label">🧠 Staff Mindset</div>
          <div class="staff-text">${q.staffMindset}</div>
        </div>`;
      }
      html += `</div>`;
    }

    html += `</div>`;

    html += `<div class="q-nav">`;
    if (qIdx > 0) {
      html += `<button class="btn btn-ghost" onclick="state.activeQuestion=${qIdx-1};stopTimer();render()">← Previous</button>`;
    } else {
      html += `<div></div>`;
    }
    if (answer && qIdx < order.length - 1) {
      html += `<button class="btn btn-primary" onclick="state.activeQuestion=${qIdx+1};render()">Next →</button>`;
    } else if (answer && qIdx === order.length - 1) {
      const tierIdx = TIER_NAMES.indexOf(tier);
      if (tierIdx < TIER_NAMES.length - 1) {
        const nextTier = TIER_NAMES[tierIdx + 1];
        html += `<button class="btn btn-primary" onclick="navigate('domain','${domain.id}','${nextTier}')">Next Tier: ${TIER_LABELS[nextTier]} →</button>`;
      } else {
        html += `<button class="btn btn-primary" onclick="navigate('dashboard')">Back to Dashboard</button>`;
      }
    } else {
      html += `<div></div>`;
    }
    html += `</div>`;

    if (state.timerEnabled && !answer) {
      setTimeout(() => startTimer(TIER_TIMES[tier]), 50);
    }
  } else {
    html += `<div class="empty-state">
      <div class="empty-icon">🎉</div>
      <div class="empty-title">Tier Complete!</div>
      <div class="empty-desc">You've answered all questions in this tier.</div>
    </div>`;
  }
  return html;
}

function renderProgress() {
  let html = `<h2 style="font-size:22px;font-weight:700;margin-bottom:24px">Progress Tracker</h2>`;
  for (const domain of DOMAINS) {
    const p = getDomainProgress(domain.id);
    const pct = p.total > 0 ? Math.round(p.answered / p.total * 100) : 0;
    const acc = p.answered > 0 ? Math.round(p.correct / p.answered * 100) : 0;
    const mastery = hasMastery(domain.id);
    html += `<div class="progress-domain">
      <div class="progress-domain-header">
        <div class="progress-domain-icon" style="background:${domain.color}22">${domain.icon}</div>
        <div class="progress-domain-name">${domain.name}${mastery ? ' <span class="mastery-badge">★ MASTERY</span>' : ''}</div>
        <div class="progress-domain-pct">${pct}% · ${acc}% accuracy</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${domain.color}"></div></div>
      <div class="progress-tiers">`;
    for (const tier of TIER_NAMES) {
      const tp = getTierProgress(domain.id, tier);
      const tAcc = tp.answered > 0 ? Math.round(tp.correct / tp.answered * 100) : 0;
      html += `<div class="progress-tier">${TIER_LABELS[tier]}: <span>${tp.answered}/${tp.total}</span> · ${tAcc}%</div>`;
    }
    html += `</div></div>`;
  }
  return html;
}

function renderBookmarks() {
  let html = `<h2 style="font-size:22px;font-weight:700;margin-bottom:24px">Bookmarked Questions (${state.bookmarks.length})</h2>`;
  if (state.bookmarks.length === 0) {
    return html + `<div class="empty-state"><div class="empty-icon">🔖</div>
      <div class="empty-title">No Bookmarks Yet</div>
      <div class="empty-desc">Bookmark questions during practice to review them here.</div></div>`;
  }
  for (const bm of state.bookmarks) {
    const domain = DOMAINS.find(d => d.id === bm.domainId);
    const q = domain.tiers[bm.tier][bm.qIndex];
    html += `<div class="bookmark-item" onclick="state.activeDomain='${bm.domainId}';state.activeTier='${bm.tier}';state.activeQuestion=${getShuffledOrder(bm.domainId, bm.tier).indexOf(bm.qIndex)};state.view='domain';render()">
      <div class="bookmark-domain">${domain.icon} ${domain.name} · ${TIER_LABELS[bm.tier]}</div>
      <div class="bookmark-q">${q.q}</div>
    </div>`;
  }
  return html;
}

function renderReview() {
  let html = `<h2 style="font-size:22px;font-weight:700;margin-bottom:24px">Review Answers</h2>`;
  let hasAnswers = false;
  for (const domain of DOMAINS) {
    for (const tier of TIER_NAMES) {
      const questions = domain.tiers[tier];
      let tierAnswers = [];
      for (let i = 0; i < questions.length; i++) {
        const key = getAnswerKey(domain.id, tier, i);
        if (state.answers[key]) tierAnswers.push({ q: questions[i], ans: state.answers[key], idx: i });
      }
      if (tierAnswers.length === 0) continue;
      hasAnswers = true;
      html += `<div style="margin-bottom:24px">
        <h3 style="font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px">
          <span>${domain.icon}</span> ${domain.name} · ${TIER_LABELS[tier]}
        </h3>`;
      for (const item of tierAnswers) {
        html += `<div class="review-item">
          <div class="review-q">${item.q.q}</div>
          <div class="review-answer ${item.ans.correct?"correct":"wrong"}">
            ${item.ans.correct ? "✓" : "✗"} Your answer: ${LETTERS[item.ans.selected]}. ${item.q.options[item.ans.selected]}
            ${!item.ans.correct ? "<br>Correct: " + LETTERS[item.q.correct] + ". " + item.q.options[item.q.correct] : ""}
          </div>
        </div>`;
      }
      html += `</div>`;
    }
  }
  if (!hasAnswers) {
    html += `<div class="empty-state"><div class="empty-icon">📝</div>
      <div class="empty-title">No Answers Yet</div>
      <div class="empty-desc">Start answering questions to review them here.</div></div>`;
  }
  return html;
}

function render() {
  renderSidebar();
  renderHeader();
  const content = document.getElementById("content");
  switch (state.view) {
    case "dashboard": content.innerHTML = renderDashboard(); break;
    case "domain": content.innerHTML = renderDomain(); break;
    case "progress": content.innerHTML = renderProgress(); break;
    case "bookmarks": content.innerHTML = renderBookmarks(); break;
    case "review": content.innerHTML = renderReview(); break;
    default: content.innerHTML = renderDashboard();
  }
}

render();

// Register Service Worker for PWA / offline support
if ('serviceWorker' in navigator) {
  // Use relative path so it works on any subpath (GitHub Pages, etc.)
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
